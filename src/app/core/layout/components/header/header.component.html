<nav class="h-[80px] mx-auto flex items-center justify-center">
  <div class="flex items-center justify-between w-[98%] h-[70px] px-4 bg-white shadow-sm rounded-lg">
    <div>
      <h1 class="text-2xl font-bold text-primary">PimelStore</h1>
    </div>
    <div class="flex justify-end items-center gap-4 h-[70px]">
      @if (pwaInstall.canInstall()) {
        <button
          (click)="install()"
          title="Instalar PimelStore"
          class="flex items-center gap-1 text-primary hover:opacity-70 cursor-pointer">
          <span class="material-icons" aria-hidden="true">install_mobile</span>
          <span class="text-sm font-medium hidden sm:inline">Instalar</span>
        </button>
      }
      <app-toggle
        [isActive]="isDarkModeActive"
        (valueChange)="onToggle($event)">
      </app-toggle>
      <button (click)="logout()" class="flex items-center gap-1 text-primary hover:opacity-70 cursor-pointer">
        <span class="material-icons" aria-hidden="true">logout</span>
        <span class="text-sm font-medium">Sair</span>
      </button>
    </div>
  </div>
</nav>
