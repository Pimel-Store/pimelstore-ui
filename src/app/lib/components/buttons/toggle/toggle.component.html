<div class="theme-toggle">
  <input [checked]="isActive()" (change)="onToggle($event)" type="checkbox" id="toggle-theme" aria-label="Toggle dark mode" />
  <label for="toggle-theme" class="toggle-label">
    <span class="toggle-ball">
      <mat-icon>{{ isActive() ? 'bedtime' : 'wb_sunny' }}</mat-icon>
    </span>
  </label>
</div>
